<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Example</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #121212;
            color: #fff;
        }
        #log {
            background: #000;
            padding: 10px;
            height: 300px;
            overflow-y: scroll;
            border: 1px solid #333;
        }
        .status-on {
            color: #00ff00;
        }
        .status-off {
            color: #ff0000;
        }
    </style>            
</head>
<body>
    <h1>WebSocket Broadcast control</h1>
    <p id="status" class="status-off">Connecting...</p>
    <form class="messageform">
        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
        <button type="submit">Send</button>
    </form>

    <h3>Log:</h3>
    <pre id="log">

    </pre>
</body>
<script>
    const statusEl = document.getElementById('status');
    const log = document.getElementById('log');
    const input = document.getElementById('message-input');


    const socket = new WebSocket('ws://localhost:8080');

    const appendLog = (label ,message) => {
        const entry = `${new Date().toLocaleTimeString()} ${label} ${message}\n`;
        log.textContent += entry;
    }

        socket.addEventListener('open', () => {
            statusEl.textContent = 'Connected : ws://localhost:8080';
            statusEl.className = 'status-on';
            appendLog('Connected to WebSocket server at ws://localhost:8080');
        });

        socket.addEventListener('message', (event) => {
            appendLog('Received: ', event.data);
        });

        socket.addEventListener('close', () => {
            statusEl.textContent = 'Disconnected';
            statusEl.className = 'status-off';
            appendLog('WebSocket connection closed.');
        });

        document.querySelector('.messageform').addEventListener('submit', (e) => {
            e.preventDefault();
            if (socket.readyState !== WebSocket.OPEN) {
            appendLog('Cannot send message, WebSocket is not open.');
            } else {
                const message = input.value.trim();
                socket.send(message);
                appendLog('Sent: ', message);
                input.value = '';
            }
            
        });
</script>
</html>
